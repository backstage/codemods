# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: 'Rename EXPERIMENTAL_formDecorators to formDecorators in YAML template specs'
        js-ast-grep:
          js_file: scripts/codemod-yaml.ts
          language: yaml
          include:
            - '**/*.yaml'
            - '**/*.yml'
          exclude:
            - '**/node_modules/**'

      - name: 'Rename EXPERIMENTAL_formDecorators to formDecorators in TS object literals'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: tsx
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'
