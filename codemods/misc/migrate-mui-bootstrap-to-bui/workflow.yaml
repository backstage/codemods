# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

params:
  schema:
    buiVersion:
      type: string
      default: '^0.16.0'
      description: 'Semver range for @backstage/ui (defaults match the MUI foundation migration recipe)'
    remixVersion:
      type: string
      default: '^4.9.0'
      description: 'Semver range for @remixicon/react when @material-ui/icons is present'

nodes:
  - id: apply-transforms
    name: 'Apply AST Transformations'
    type: automatic
    steps:
      - name: 'Add BUI and Remix dependencies to package.json'
        js-ast-grep:
          js_file: scripts/package-json-codemod.ts
          language: 'json'
          include:
            - '**/package.json'
          exclude:
            - '**/node_modules/**'
      - name: 'Bootstrap app dependencies and root CSS'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'tsx'
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'
