# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json
#
# Local-path mirror of workflow.yaml for pre-publish dry-runs against a sibling
# Backstage checkout (e.g. ../backstage). Not published — registry consumers use
# workflow.yaml with @backstage/* sources.
#
# Usage (from this package directory):
#   yarn exec codemod workflow run -w workflow.local.yaml \
#     -t /absolute/path/to/backstage \
#     --dry-run --no-interactive --allow-dirty
# Sibling checkout from repo root is typically ../../backstage (or ../../../backstage from a git worktree).

version: '1'

nodes:
  - id: apply-recipe
    name: 'Run every MUI 4 to BUI codemod in order (local packages)'
    type: automatic
    steps:
      # --- Phase 1: bootstrap / package setup (run first)
      - name: 'Bootstrap BUI dependencies and root CSS'
        codemod:
          source: '../migrate-mui-bootstrap-to-bui'

      # --- Phase 2: icon source + styling architecture
      - name: 'Replace MUI icons with Remix icons'
        codemod:
          source: '../migrate-mui-icons-to-remix-icons'

      - name: 'Migrate makeStyles usage to BUI CSS modules'
        codemod:
          source: '../migrate-mui-styles-to-bui-css-modules'

      # --- Phase 3: core components
      - name: 'Migrate Typography to Text'
        codemod:
          source: '../migrate-mui-typography-to-text'

      - name: 'Migrate Alert to BUI Alert'
        codemod:
          source: '../migrate-mui-alert-to-bui-alert'

      - name: 'Migrate Avatar to BUI Avatar'
        codemod:
          source: '../migrate-mui-avatar-to-bui-avatar'

      - name: 'Migrate Skeleton to BUI Skeleton'
        codemod:
          source: '../migrate-mui-skeleton-to-bui-skeleton'

      - name: 'Migrate Button to BUI Button'
        codemod:
          source: '../migrate-mui-button-to-bui-button'

      - name: 'Migrate IconButton to ButtonIcon'
        codemod:
          source: '../migrate-mui-icon-button-to-button-icon'

      - name: 'Migrate Link to BUI Link'
        codemod:
          source: '../migrate-mui-link-to-bui-link'

      - name: 'Migrate Tooltip to BUI Tooltip'
        codemod:
          source: '../migrate-mui-tooltip-to-bui-tooltip'

      # --- Phase 4: complex components
      - name: 'Migrate Dialog to BUI Dialog'
        codemod:
          source: '../migrate-mui-dialog-to-bui-dialog'

      - name: 'Migrate Tabs to BUI Tabs'
        codemod:
          source: '../migrate-mui-tabs-to-bui-tabs'

      - name: 'Migrate Menu or Popover to BUI Menu/Popover'
        codemod:
          source: '../migrate-mui-menu-popover-to-bui-menu'

      - name: 'Migrate List family to BUI List'
        codemod:
          source: '../migrate-mui-list-family-to-bui-list'

      - name: 'Migrate Chip to Tag'
        codemod:
          source: '../migrate-mui-chip-to-tag'

      - name: 'Migrate Card family to BUI Card'
        codemod:
          source: '../migrate-mui-card-to-bui-card'

      # --- Phase 5: form controls
      - name: 'Migrate Select family to BUI Select'
        codemod:
          source: '../migrate-mui-select-family-to-bui-select'

      - name: 'Migrate TextField to BUI TextField'
        codemod:
          source: '../migrate-mui-textfield-to-bui-textfield'

      - name: 'Migrate Autocomplete to BUI Combobox'
        codemod:
          source: '../migrate-mui-autocomplete-to-combobox'

      - name: 'Migrate Accordion to BUI Accordion'
        codemod:
          source: '../migrate-mui-accordion-to-bui-accordion'

      - name: 'Migrate radio/checkbox groups to BUI groups'
        codemod:
          source: '../migrate-mui-radio-checkbox-to-bui'

      - name: 'Migrate Switch to BUI Switch'
        codemod:
          source: '../migrate-mui-switch-to-bui-switch'

      - name: 'Migrate Slider to BUI Slider'
        codemod:
          source: '../migrate-mui-slider-to-bui-slider'

      # --- Phase 6: layout primitives (after components so wrappers settle first)
      - name: 'Convert MUI layout primitives to BUI layout'
        codemod:
          source: '../migrate-mui-layout-to-bui-layout'

      # --- Phase 7: cleanup (run last)
      - name: 'Remove unused @material-ui/* dependencies'
        codemod:
          source: '../remove-mui-dependencies'
