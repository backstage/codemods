# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: 'Apply AST Transformations'
    type: automatic
    steps:
      - name: 'Migrate interface extends ComboboxProps/SelectProps to type intersection'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'tsx'
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'

      - name: 'Add TODO comments to .bui-SelectPopover > CSS selectors'
        js-ast-grep:
          js_file: scripts/codemod-css.ts
          language: 'css'
          include:
            - '**/*.css'
            - '**/*.scss'
          exclude:
            - '**/node_modules/**'
