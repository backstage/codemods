# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: 'Apply YAML Transformations'
    type: automatic
    steps:
      - name: 'Remove deprecated catalog.stitchingStrategy.mode from app-config'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'yaml'
          include:
            - '**/app-config.yaml'
            - '**/app-config.*.yaml'
          exclude:
            - '**/node_modules/**'
