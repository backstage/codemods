# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: 'Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically.'

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: 'Replace deprecated DialogApi .show() and .showModal() with .open()'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'tsx'
          semantic_analysis: workspace
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: 'Fix remaining edge cases that require contextual understanding'
        if: params.aiFixup == true
        ai:
          model: 'claude-sonnet-4-6'
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that replaced deprecated DialogApi .show() and
            .showModal() calls with .open() in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Renamed .show() and .showModal() to .open()
            - Added TODO comments about behavioral differences
            - Detected dismissal checks on .show() return values (=== undefined,
              == null, truthiness checks, nullish coalescing) and added specific
              TODO comments on those patterns

            Your job is to find and fix remaining issues that the AST codemod could not
            handle mechanically. Be precise and conservative.
          prompt: |
            Search the codebase for remaining DialogApi migration issues and fix them:

            ## 1. Dialog chrome migration
            Find any .open() calls (formerly .show() or .showModal()) where the content
            component does not include its own dialog wrapper (e.g., MUI Dialog, Modal).
            Add TODO comments noting that the component needs to provide its own dialog
            chrome (backdrop, surface, focus trap).

            ## 2. Backdrop click handling
            Find any code that relied on .show()'s built-in backdrop-click-to-close
            behavior. Add TODO comments explaining that this behavior must now be
            implemented manually in the dialog component.

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
