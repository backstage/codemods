# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Replace createSchemaFromZod / config.schema with configSchema"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that replaced createSchemaFromZod and config.schema
            with the new configSchema property in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Removed createSchemaFromZod imports from @backstage/frontend-plugin-api
            - Replaced config.schema with configSchema in createExtension/createExtensionBlueprint
            - Updated zod import from 'zod' to 'zod/v4'
            - Unwrapped createSchemaFromZod(z => z.object({...})) to inline configSchema
            - Converted callback patterns { field: z => z.type() } to { field: z.type() }

            Your job is to find and fix remaining issues that the AST codemod could not
            handle mechanically. Be precise and conservative.
          prompt: |
            Search the codebase for remaining migration issues and fix them:

            ## 1. Complex createSchemaFromZod patterns
            Find any remaining createSchemaFromZod calls that weren't transformed.
            These may have complex patterns like variable references, spread operators,
            or conditional logic inside the callback.

            ## 2. Override and makeWithOverrides calls
            Find .override() or .makeWithOverrides() calls that still use the old
            config.schema pattern. Transform them to use configSchema.

            ## 3. Zod import verification
            Ensure all files using zod schemas import from 'zod/v4', not 'zod'.
            Direct zod v3 schemas are rejected at runtime.

            ## 4. Type annotation cleanup
            If any type annotations reference createSchemaFromZod or the old config
            schema types, update or remove them.

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
