# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Add entityRef field to Location object literals"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          semantic_analysis: workspace
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are refining the output of an
            AST-based codemod that added the required `entityRef` field to `Location`
            object literals from `@backstage/catalog-client` in Backstage 1.50.0.

            The AST codemod already handled all mechanical parts:
            - Location objects with explicit type annotations (`: Location`, `satisfies Location`,
              `as Location`) had `entityRef: 'location:default/example'` added with a TODO comment.
            - Objects using spread from another Location were skipped (they inherit the field).
            - Objects already containing `entityRef` were skipped.
            - Variables returned from functions with a Location return type were traced via
              semantic analysis and had `entityRef` added.
            - Mock implementations (`jest.fn<() => Location>().mockImplementation(...)`) were
              detected and had `entityRef` added to their returned objects.
            - Test assertions (`toEqual`, `toMatchObject`) on Location-typed variables were
              detected and had `entityRef` added to the expected objects.

            Your job is to replace placeholder `entityRef` values with contextually appropriate
            ones. Be precise and conservative — only change what is necessary.
          prompt: |
            Search the codebase for Location object literals that have the placeholder
            `entityRef: 'location:default/example'` with a TODO comment added by the codemod.

            ## Replace placeholder entityRef values
            Where possible, replace the placeholder `'location:default/example'` with a more
            contextually appropriate value based on the `target` URL in the same object. The
            format is `location:default/generated-<description>`. Keep the TODO comment.

            For example:
            - `target: 'https://github.com/org/repo/blob/main/catalog-info.yaml'`
              → `entityRef: 'location:default/generated-org-repo-catalog-info'`
            - `target: 'https://example.com/mock.yaml'`
              → `entityRef: 'location:default/generated-mock'`

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 20
