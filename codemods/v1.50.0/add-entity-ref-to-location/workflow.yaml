# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Add entityRef field to Location object literals"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that added the required `entityRef` field to
            `Location` object literals from `@backstage/catalog-client` in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Location objects with explicit type annotations (`: Location`, `satisfies Location`,
              `as Location`) had `entityRef: 'location:default/example'` added with a TODO comment.
            - Objects using spread from another Location were skipped (they inherit the field).
            - Objects already containing `entityRef` were skipped.

            Your job is to find and fix the remaining issues that the AST codemod could not
            handle mechanically. Be precise and conservative — only change what is necessary.
          prompt: |
            Search the codebase for remaining Location object literals that need the `entityRef`
            field added. Address each category below:

            ## 1. Inferred Location types
            Find object literals assigned to variables or parameters where the type is inferred
            as `Location` from context (e.g., function return types, generic parameters) rather
            than explicitly annotated. Add the `entityRef` field with the placeholder value and
            TODO comment.

            ## 2. Dynamic mock setups
            Find mock implementations using `jest.fn().mockImplementation()` or
            `vi.fn().mockImplementation()` that return Location objects without explicit type
            casts. Add the `entityRef` field to those return values.

            ## 3. Replace placeholder entityRef values
            Where possible, replace the placeholder `'location:default/example'` with a more
            contextually appropriate value based on the `target` URL in the same object. The
            format is `location:default/generated-<description>`. Keep the TODO comment.

            ## 4. Verify test assertions
            Check test files for assertions that reference Location object shapes (e.g.,
            `expect(result).toEqual({ id, type, target })`) and add `entityRef` to those
            expected values as well.

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
