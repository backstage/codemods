# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Add updateLocation method to CatalogApi and CatalogService implementations"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that added the required `updateLocation` method
            to CatalogApi and CatalogService implementations in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Classes with `implements CatalogApi` got a throwing stub method
            - Classes with `implements CatalogService` got a throwing stub method
            - Mock objects typed as jest.Mocked<CatalogApi> got updateLocation: jest.fn()
            - Mock objects typed with vi.Mocked got updateLocation: vi.fn()

            Your job is to find and fix any remaining implementations or mocks that
            the AST codemod could not handle. Be precise and conservative.
          prompt: |
            Search the codebase for remaining CatalogApi or CatalogService implementations
            that are missing the `updateLocation` method and add it.

            Look for:
            1. Duck-typed objects that satisfy CatalogApi but don't use `implements`
            2. Factory functions returning CatalogApi-typed objects
            3. Complex mock patterns not caught by the AST codemod
            4. Proxy or wrapper patterns around CatalogApi

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
