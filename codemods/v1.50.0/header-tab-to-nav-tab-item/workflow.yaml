# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: 'Run an AI-powered fixup step to address complex matchStrategy patterns the AST codemod cannot handle mechanically (computed properties, dynamic assignment).'

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: 'Rename HeaderTab to HeaderNavTabItem and remove matchStrategy property'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'tsx'
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: 'Fix complex matchStrategy patterns the AST codemod cannot handle'
        if: params.aiFixup == true
        ai:
          model: 'claude-sonnet-4-6'
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that renamed HeaderTab to HeaderNavTabItem and
            removed the matchStrategy property in @backstage/ui v0.14.0 (Backstage 1.50.0).

            The AST codemod already handled:
            - Named imports: `import { HeaderTab }` -> `import { HeaderNavTabItem }`
            - Namespace imports: `UI.HeaderTab` -> `UI.HeaderNavTabItem`
            - Type annotations, type assertions (`as HeaderTab`), and generic parameters
            - Simple `matchStrategy` property removal from object literals

            Your job is ONLY to fix complex matchStrategy patterns that the AST codemod
            could not handle mechanically. Be precise and conservative.
          prompt: |
            Search the codebase for remaining `matchStrategy` properties on tab objects
            that the AST codemod missed. These are cases involving:

            - Computed property names (e.g., `[strategyKey]: 'prefix'`)
            - Dynamic property assignment (e.g., `tab.matchStrategy = 'prefix'`)
            - Spread patterns that inject matchStrategy indirectly
            - Deeply nested or conditionally assigned matchStrategy values

            Remove any remaining matchStrategy properties or assignments you find.
            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 30
