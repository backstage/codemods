# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically (namespace imports, complex matchStrategy removals)."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Rename HeaderTab to HeaderNavTabItem and remove matchStrategy property"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          semantic_analysis: file
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that renamed HeaderTab to HeaderNavTabItem and
            removed matchStrategy property in @backstage/ui v0.14.0 (Backstage 1.50.0).

            The AST codemod already handled the mechanical parts:
            - Renamed HeaderTab type references to HeaderNavTabItem
            - Removed matchStrategy property from tab objects
            - Updated imports accordingly

            Your job is to find and fix the remaining issues that the AST codemod could not
            handle mechanically. Be precise and conservative -- only change what is necessary.
          prompt: |
            Search the codebase for remaining migration issues and fix them:

            ## 1. Namespace imports
            Find any `import * as <alias> from '@backstage/ui'` statements where the alias
            is used to access `<alias>.HeaderTab`. Replace with `<alias>.HeaderNavTabItem`.

            ## 2. Complex matchStrategy removals
            Find any remaining `matchStrategy` properties on tab objects that the AST
            codemod missed due to complex nesting or computed property names.

            ## 3. Type assertions and generic type parameters
            Find any `as HeaderTab` type assertions or generic parameters using HeaderTab
            that may have been missed.

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
