# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: 'Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically (mixed context files where the wrong replacement API was chosen).'

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: 'Replace humanizeEntityRef/humanizeEntity with Catalog Presentation API'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: 'tsx'
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: 'Fix remaining edge cases that require contextual understanding'
        if: '${{ params.aiFixup }}'
        ai:
          model: 'claude-sonnet-4-6'
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that migrated humanizeEntityRef/humanizeEntity
            to the Catalog Presentation API in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Named imports: humanizeEntityRef / humanizeEntity (including aliases)
            - Namespace imports: CatalogReact.humanizeEntityRef(...) etc.
            - JSX expressions → <EntityDisplayName entityRef={ref} />
            - React component bodies → useEntityPresentation(ref).primaryTitle
            - Non-React utilities → entityPresentationSnapshot(ref).primaryTitle
            - humanizeEntity(entity, fallback) → same replacements
            - String-context detection (template literals, concatenation) → hook/snapshot
            - defaultKind/defaultNamespace options mapping
            - Import and re-export updates

            Your job is to find and fix files where the AST codemod may have chosen
            the wrong replacement. Be precise and conservative — only change what is
            necessary.
          prompt: |
            Search the codebase for files where the codemod may have incorrectly chosen
            the replacement API based on context. Specifically look for:

            - `useEntityPresentation` used in a non-React utility file (should be
              `entityPresentationSnapshot`)
            - `entityPresentationSnapshot` used inside a React component where the
              hook `useEntityPresentation` would be more appropriate
            - `<EntityDisplayName>` used where a string value is actually needed
              (e.g., passed to a function expecting `string`, used in comparisons)

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 50
