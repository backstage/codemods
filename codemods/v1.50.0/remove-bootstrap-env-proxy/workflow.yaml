# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: "Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically."

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Remove deprecated bootstrapEnvProxyAgents() calls and imports"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: "Fix remaining edge cases that require contextual understanding"
        if: "${{ params.aiFixup }}"
        ai:
          model: "claude-sonnet-4-6"
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that removed deprecated bootstrapEnvProxyAgents()
            calls from @backstage/cli-common in Backstage 1.50.0.

            The AST codemod already handled the mechanical parts:
            - Removed bootstrapEnvProxyAgents import from @backstage/cli-common
            - Removed the entire import statement if no other imports remained
            - Removed bootstrapEnvProxyAgents() call statements
            - Added TODO comments about setting NODE_USE_ENV_PROXY=1

            Your job is to find and fix the remaining issues that the AST codemod could not
            handle mechanically. Be precise and conservative -- only change what is necessary.
          prompt: |
            Search the codebase for remaining migration issues and fix them:

            ## 1. Namespace imports
            Find any `import * as <alias> from '@backstage/cli-common'` statements where
            the namespace alias is used to call `<alias>.bootstrapEnvProxyAgents()`.
            Remove those call sites and add the TODO comment.

            ## 2. Dynamic imports
            Find any `await import('@backstage/cli-common')` patterns where
            bootstrapEnvProxyAgents is destructured and called. Remove the call and add
            the TODO comment.

            ## 3. Environment configuration
            Search for any .env files, Dockerfiles, docker-compose files, or shell scripts
            that set HTTP_PROXY or HTTPS_PROXY and suggest adding NODE_USE_ENV_PROXY=1
            alongside them.

            After making changes, verify the files are syntactically valid TypeScript.
          max_steps: 30
