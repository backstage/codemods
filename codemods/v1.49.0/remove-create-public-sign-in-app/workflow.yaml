# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

params:
  schema:
    aiFixup:
      type: boolean
      default: false
      description: 'Run an AI-powered fixup step to address edge cases the AST codemod cannot handle mechanically.'

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: 'Replace createPublicSignInApp with createApp + appModulePublicSignIn'
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: tsx
          semantic_analysis: file
          include:
            - '**/*.ts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'

  - id: ai-fixup
    name: AI fixup for edge cases
    type: automatic
    depends_on: [apply-transforms]
    steps:
      - name: 'Fix remaining edge cases that require contextual understanding'
        if: params.aiFixup == true
        ai:
          model: 'claude-sonnet-4-6'
          system_prompt: |
            You are a Backstage migration expert. You are fixing edge cases left over
            from an AST-based codemod that replaced createPublicSignInApp with createApp
            combined with appModulePublicSignIn from @backstage/plugin-app/alpha.

            Your job is to find and fix any remaining issues the AST codemod could not
            handle mechanically. Be precise and conservative.
          prompt: |
            Search the codebase for remaining migration issues:

            1. Find any remaining references to createPublicSignInApp
            2. Ensure appModulePublicSignIn is properly imported from @backstage/plugin-app/alpha
            3. Verify the modules array is correctly constructed
            4. Add @backstage/plugin-app as a dependency if not present

            After making changes, verify the files are syntactically valid.
          max_steps: 15
